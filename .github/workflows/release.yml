name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Linux x86_64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Frontend
        working-directory: web
        run: |
          npm install
          npm run build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl-tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build Backend
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Prepare Release Assets
        run: |
          mkdir -p upload
          cp target/x86_64-unknown-linux-musl/release/dockpanel upload/dockpanel-linux-amd64
          cp install.sh upload/install.sh
          cp update.sh upload/update.sh
          chmod +x upload/dockpanel-linux-amd64

      - name: Upload to S3 (CSTCloud)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          aws configure set default.s3.addressing_style path
          aws s3 cp upload/dockpanel-linux-amd64 s3://${{ secrets.S3_BUCKET }}/dockpanel/dockpanel-linux-amd64 --endpoint-url https://s3.cstcloud.cn
          aws s3 cp upload/install.sh s3://${{ secrets.S3_BUCKET }}/dockpanel/install.sh --endpoint-url https://s3.cstcloud.cn
          aws s3 cp upload/update.sh s3://${{ secrets.S3_BUCKET }}/dockpanel/update.sh --endpoint-url https://s3.cstcloud.cn

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            upload/dockpanel-linux-amd64
          body: |
            ## 🚀 RecchDockerPanel ${{ github.ref_name }}

            ### 一键安装
            ```bash
            curl -fsSL https://s3.cstcloud.cn/586da32874fe4876ba47f51a56a5a888/dockpanel/install.sh | bash
            ```

            ### 更新面板
            ```bash
            curl -fsSL https://s3.cstcloud.cn/586da32874fe4876ba47f51a56a5a888/dockpanel/update.sh | bash
            ```
