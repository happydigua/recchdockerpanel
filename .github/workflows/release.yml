name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Linux x86_64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Frontend
        working-directory: web
        run: |
          npm install
          npm run build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl-tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build Backend
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Prepare Release Asset
        run: |
          cp target/x86_64-unknown-linux-musl/release/dockpanel ./dockpanel-linux-amd64
          chmod +x dockpanel-linux-amd64

      - name: Upload to Cloudflare R2
        uses: jakejarvis/s3-sync-action@master
        env:
          AWS_S3_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          AWS_S3_BUCKET: ${{ secrets.R2_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          SOURCE_DIR: '.'
          DEST_DIR: 'dockpanel'
        with:
          args: --include "dockpanel-linux-amd64" --include "install.sh" --include "update.sh"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dockpanel-linux-amd64
          body: |
            ## 🚀 DockPanel ${{ github.ref_name }}

            ### 一键安装
            ```bash
            curl -fsSL https://download.recch.com/dockpanel/install.sh | bash
            ```

            ### 更新
            ```bash
            curl -fsSL https://download.recch.com/dockpanel/update.sh | bash
            ```
