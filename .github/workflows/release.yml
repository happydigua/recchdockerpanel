name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Linux x86_64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Frontend
        working-directory: web
        run: |
          npm install
          npm run build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl-tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build Backend
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Prepare Release Asset
        run: |
          cp target/x86_64-unknown-linux-musl/release/dockpanel ./dockpanel-linux-amd64
          chmod +x dockpanel-linux-amd64

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dockpanel-linux-amd64
            install.sh
            update.sh
          body: |
            ## 🚀 RecchDockerPanel ${{ github.ref_name }}

            ### 一键安装
            ```bash
            curl -fsSL https://raw.githubusercontent.com/happydigua/recchdockerpanel/main/install.sh | bash
            ```

            ### 更新已安装的面板
            ```bash
            curl -fsSL https://raw.githubusercontent.com/happydigua/recchdockerpanel/main/update.sh | bash
            ```
