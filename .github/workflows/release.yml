name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Linux x86_64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Frontend
        working-directory: web
        run: |
          npm install
          npm run build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl-tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build Backend
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Prepare Release Assets
        run: |
          mkdir -p upload
          cp target/x86_64-unknown-linux-musl/release/dockpanel upload/dockpanel-linux-amd64
          cp install.sh upload/install.sh
          cp update.sh upload/update.sh
          chmod +x upload/dockpanel-linux-amd64

      - name: Upload to Cloudflare R2
        uses: ryand56/r2-upload-action@latest
        with:
          r2-account-id: ${{ secrets.R2_ACCOUNT_ID }}
          r2-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          r2-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          r2-bucket: ${{ secrets.R2_BUCKET }}
          source-dir: upload
          destination-dir: dockpanel

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            upload/dockpanel-linux-amd64
          body: |
            ## 🚀 RecchDockerPanel ${{ github.ref_name }}

            ### 一键安装
            ```bash
            curl -fsSL https://download.recch.com/dockpanel/install.sh | bash
            ```

            ### 更新面板
            ```bash
            curl -fsSL https://download.recch.com/dockpanel/update.sh | bash
            ```
